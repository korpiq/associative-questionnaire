<style>
  body {
    background: #f4efe5;
    color: #1f2933;
    font-family: Georgia, serif;
    margin: 0;
  }

  form {
    display: grid;
    gap: 1.5rem;
  }

  button,
  input,
  textarea {
    font: inherit;
  }

  section,
  article {
    display: grid;
    gap: 0.75rem;
  }

  .survey-shell {
    margin: 0 auto;
    max-width: 60rem;
    padding: 2rem 1rem 3rem;
  }

  .survey-header {
    display: grid;
    gap: 0.75rem;
    background: #16324f;
    border-radius: 1rem;
    color: #f8fafc;
    padding: 1.5rem;
  }

  .survey-eyebrow,
  .survey-section-heading > p,
  .survey-question-label {
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin: 0;
    text-transform: uppercase;
  }

  .survey-header > h1,
  .survey-section-heading > h2,
  .survey-question > h3 {
    margin: 0;
  }

  .survey-header > p:last-child,
  .survey-section-heading > p:last-child {
    font-weight: 400;
    letter-spacing: normal;
    text-transform: none;
  }

  .survey-form {
    margin: 0;
  }

  .survey-section {
    background: rgba(255, 255, 255, 0.82);
    border: 1px solid #cbd5e1;
    border-radius: 1rem;
    padding: 1.25rem;
  }

  .survey-questions {
    display: grid;
    gap: 1rem;
  }

  .survey-question {
    background: #fffdf8;
    border-radius: 0.75rem;
    box-shadow: inset 0 0 0 1px #e2e8f0;
    padding: 1rem;
  }

  .survey-content {
    display: grid;
    gap: 0.75rem;
  }

  .survey-submit {
    border: 0;
    border-radius: 999px;
    background: #16324f;
    color: #f8fafc;
    cursor: pointer;
    font-weight: 700;
    justify-self: start;
    padding: 0.85rem 1.4rem;
  }

  .survey-submit:hover {
    background: #22486f;
  }

  .survey-submit:focus-visible,
  .phrase:focus-visible,
  input:focus-visible,
  textarea:focus-visible {
    outline: 2px solid #16324f;
    outline-offset: 2px;
  }

  .survey-content input[type='text'],
  .survey-content textarea {
    border: 1px solid #cbd5e1;
    border-radius: 0.75rem;
    padding: 0.75rem;
    width: 100%;
  }

  .survey-content label {
    align-items: start;
    display: flex;
    gap: 0.6rem;
  }

  .question-options,
  .associative-groups {
    display: grid;
    gap: 0.5rem;
  }

  .associative-groups {
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr);
    min-height: 16rem;
    padding: 1rem;
    position: relative;
  }

  .associative-lines {
    height: 100%;
    inset: 0;
    pointer-events: none;
    position: absolute;
    width: 100%;
    z-index: 0;
  }

  .associative-line {
    stroke: #15803d;
    stroke-linecap: round;
    stroke-width: 3;
  }

  .associative-line-live {
    stroke: #2563eb;
    stroke-dasharray: 6 4;
  }

  .phrase-list {
    display: grid;
    gap: 0.5rem;
    position: relative;
    z-index: 1;
  }

  .phrase-list[data-side="left"] {
    grid-column: 1;
  }

  .phrase-list[data-side="right"] {
    grid-column: 3;
  }

  .phrase {
    align-items: center;
    background: transparent;
    border: 0;
    display: flex;
    overflow: visible;
    padding: 0;
    position: relative;
    text-align: left;
    touch-action: none;
    width: 100%;
  }

  .phrase-box {
    align-items: center;
    background: #fffdf8;
    border: 1px solid #cbd5e1;
    border-radius: 0.5rem;
    box-sizing: border-box;
    display: flex;
    gap: 0.75rem;
    min-width: 0;
    padding: 0.75rem;
    position: relative;
    width: 100%;
    z-index: 1;
  }

  .phrase.is-pending .phrase-box {
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
  }

  .phrase.is-linked .phrase-box {
    border-color: #15803d;
  }

  .phrase[data-side="left"] {
    padding-right: 0.75rem;
  }

  .phrase[data-side="right"] {
    padding-left: 0.75rem;
  }

  .phrase-handle {
    background: #15803d;
    border-radius: 999px;
    display: inline-block;
    height: 0.875rem;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 0.875rem;
    z-index: 0;
  }

  .phrase-handle-left {
    left: 0.3125rem;
  }

  .phrase-handle-right {
    right: 0.3125rem;
  }

  .phrase-key {
    font-weight: 700;
    min-width: 1.5rem;
  }
</style>
