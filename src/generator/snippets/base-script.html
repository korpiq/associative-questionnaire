<script>
(function () {
  document.documentElement.dataset.questionnaireReady = 'true';

  function readAssociations(input) {
    try {
      return JSON.parse(input.value || '[]');
    } catch (_error) {
      return [];
    }
  }

  function writeAssociations(input, associations) {
    input.value = JSON.stringify(associations);
  }

  function hasAssociation(associations, left, right) {
    return associations.some(function (association) {
      return association.left === left && association.right === right;
    });
  }

  function toggleAssociation(input, left, right) {
    var associations = readAssociations(input);

    if (hasAssociation(associations, left, right)) {
      associations = associations.filter(function (association) {
        return !(association.left === left && association.right === right);
      });
    } else {
      associations.push({ left: left, right: right });
    }

    writeAssociations(input, associations);
  }

  function findPhrase(root, side, id) {
    return root.querySelector('.phrase[data-side="' + side + '"][data-phrase-id="' + id + '"]');
  }

  function updatePhraseState(root, input, pendingPhrase) {
    var associations = readAssociations(input);

    root.querySelectorAll('.phrase[data-side][data-phrase-id]').forEach(function (phrase) {
      phrase.classList.remove('is-pending');
      phrase.classList.remove('is-linked');

      if (pendingPhrase && pendingPhrase === phrase) {
        phrase.classList.add('is-pending');
      }

      var phraseId = phrase.getAttribute('data-phrase-id');
      var side = phrase.getAttribute('data-side');
      var linked = associations.some(function (association) {
        return side === 'left'
          ? association.left === phraseId
          : association.right === phraseId;
      });

      if (linked) {
        phrase.classList.add('is-linked');
      }
    });
  }

  function updateSvgViewBox(root) {
    var svg = root.querySelector('.associative-lines');
    var rect = root.getBoundingClientRect();

    if (!svg || !rect.width || !rect.height) {
      return;
    }

    svg.setAttribute('viewBox', '0 0 ' + rect.width + ' ' + rect.height);
  }

  function toRelativePoint(root, clientX, clientY) {
    var rect = root.getBoundingClientRect();

    return {
      x: clientX - rect.left,
      y: clientY - rect.top
    };
  }

  function getPhrasePoint(root, phrase) {
    var rect = phrase.getBoundingClientRect();

    return toRelativePoint(root, rect.left + rect.width / 2, rect.top + rect.height / 2);
  }

  function hideLiveLine(root) {
    var line = root.querySelector('[data-live-line]');

    if (!line) {
      return;
    }

    line.setAttribute('hidden', 'hidden');
  }

  function updateLiveLine(root, from, to) {
    var line = root.querySelector('[data-live-line]');

    if (!line) {
      return;
    }

    updateSvgViewBox(root);
    line.removeAttribute('hidden');
    line.setAttribute('class', 'associative-line associative-line-live');
    line.setAttribute('x1', String(from.x));
    line.setAttribute('y1', String(from.y));
    line.setAttribute('x2', String(to.x));
    line.setAttribute('y2', String(to.y));
  }

  function redrawStoredLines(root, input) {
    var container = root.querySelector('[data-stored-lines]');

    if (!container) {
      return;
    }

    updateSvgViewBox(root);
    container.innerHTML = '';

    readAssociations(input).forEach(function (association) {
      var leftPhrase = findPhrase(root, 'left', association.left);
      var rightPhrase = findPhrase(root, 'right', association.right);

      if (!leftPhrase || !rightPhrase) {
        return;
      }

      var from = getPhrasePoint(root, leftPhrase);
      var to = getPhrasePoint(root, rightPhrase);
      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');

      line.setAttribute('data-stored-line', association.left + ':' + association.right);
      line.setAttribute('class', 'associative-line');
      line.setAttribute('x1', String(from.x));
      line.setAttribute('y1', String(from.y));
      line.setAttribute('x2', String(to.x));
      line.setAttribute('y2', String(to.y));
      container.appendChild(line);
    });
  }

  function setupAssociativeGroups(root) {
    var input = root.querySelector('input[data-associations-input]');

    if (!input) {
      return;
    }

    var pendingPhrase = null;
    var dragSource = null;
    var dragTarget = null;
    var skipNextClick = false;

    function clearDrag() {
      dragSource = null;
      dragTarget = null;
      hideLiveLine(root);
    }

    function connect(sourcePhrase, targetPhrase) {
      var sourceSide = sourcePhrase.getAttribute('data-side');
      var sourceId = sourcePhrase.getAttribute('data-phrase-id');
      var targetId = targetPhrase.getAttribute('data-phrase-id');
      var left = sourceSide === 'left' ? sourceId : targetId;
      var right = sourceSide === 'left' ? targetId : sourceId;

      toggleAssociation(input, left, right);
      pendingPhrase = null;
      updatePhraseState(root, input, pendingPhrase);
      redrawStoredLines(root, input);
    }

    root.querySelectorAll('.phrase[data-side][data-phrase-id]').forEach(function (phrase) {
      phrase.addEventListener('mousedown', function (event) {
        dragSource = phrase;
        dragTarget = null;
        pendingPhrase = phrase;
        updatePhraseState(root, input, pendingPhrase);
        updateLiveLine(root, getPhrasePoint(root, phrase), toRelativePoint(root, event.clientX, event.clientY));
      });

      phrase.addEventListener('mouseenter', function () {
        if (
          dragSource &&
          dragSource !== phrase &&
          dragSource.getAttribute('data-side') !== phrase.getAttribute('data-side')
        ) {
          dragTarget = phrase;
        }
      });

      phrase.addEventListener('mouseup', function () {
        if (
          dragSource &&
          dragTarget &&
          dragTarget === phrase &&
          dragSource.getAttribute('data-side') !== phrase.getAttribute('data-side')
        ) {
          connect(dragSource, phrase);
          skipNextClick = true;
        }

        clearDrag();
      });

      phrase.addEventListener('click', function () {
        if (skipNextClick) {
          skipNextClick = false;
          return;
        }

        if (dragSource || dragTarget) {
          return;
        }

        if (!pendingPhrase) {
          pendingPhrase = phrase;
          updatePhraseState(root, input, pendingPhrase);
          return;
        }

        if (pendingPhrase === phrase || pendingPhrase.getAttribute('data-side') === phrase.getAttribute('data-side')) {
          pendingPhrase = phrase;
          updatePhraseState(root, input, pendingPhrase);
          return;
        }

        connect(pendingPhrase, phrase);
      });

      phrase.addEventListener('keydown', function (event) {
        var side = phrase.getAttribute('data-side');
        var key = event.key.length === 1 ? event.key.toUpperCase() : event.key;
        var target = null;

        if (side === 'left' && /^[A-Z]$/.test(key)) {
          target = findPhrase(root, 'right', key);
        }

        if (side === 'right' && /^[0-9]$/.test(key)) {
          target = findPhrase(root, 'left', key);
        }

        if (!target) {
          return;
        }

        event.preventDefault();
        connect(phrase, target);
      });
    });

    document.addEventListener('mousemove', function (event) {
      if (!dragSource) {
        return;
      }

      updateLiveLine(root, getPhrasePoint(root, dragSource), toRelativePoint(root, event.clientX, event.clientY));
    });
    document.addEventListener('mouseup', clearDrag);
    updatePhraseState(root, input, pendingPhrase);
    redrawStoredLines(root, input);
    hideLiveLine(root);
  }

  document.querySelectorAll('.associative-groups[data-question-type="associative"]').forEach(setupAssociativeGroups);
})();
</script>
